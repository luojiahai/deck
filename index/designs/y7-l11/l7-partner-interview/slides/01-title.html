<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L7-01 · Title · 采访·报告</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
    overflow: hidden;
  }
  .main {
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .lesson-num {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent-gold);
    text-transform: uppercase;
    margin-bottom: var(--space-md);
  }
  .interview-icon {
    display: flex;
    gap: 16px;
    align-items: center;
    justify-content: center;
    margin: 0 auto var(--space-lg);
  }
  .interview-icon .bubble {
    width: 74px; height: 74px;
    border-radius: 50% 50% 50% 4px;
    border: 4px solid var(--accent-gold-dim);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 30px; font-weight: 900;
    color: var(--accent-gold);
  }
  .interview-icon .bubble:last-child {
    border-radius: 50% 50% 4px 50%;
  }
  .interview-icon .arrow {
    font-size: 24px;
    color: var(--border-medium);
  }
  .title-cn {
    font-family: var(--font-display);
    font-size: 118px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .title-cn .dot {
    color: var(--accent-gold);
  }
  .title-en {
    font-size: 32px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-bottom: var(--space-xl);
  }
  .meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-size: 16px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
  .meta .sep {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent-gold);
  }
  .bg-char {
    position: absolute;
    right: -30px; bottom: -60px;
    font-size: 360px;
    font-family: var(--font-display);
    color: var(--accent-gold);
    opacity: 0.04;
    line-height: 1;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="bg-char">访</div>
<div class="main">
  <div class="interview-icon">
    <div class="bubble">问</div>
    <div class="arrow">⇄</div>
    <div class="bubble">答</div>
  </div>
  <div class="lesson-num">Lesson 7 of 8 · Y7 Unit 4</div>
  <h1 class="title-cn">采访<span class="dot">·</span>报告</h1>
  <div class="title-en">Partner Interview &amp; Daily Routine Report · 采访同伴，写日常起居报告</div>
  <div class="meta">
    <span>Year 7 Chinese</span>
    <span class="sep"></span>
    <span>50 mins</span>
    <span class="sep"></span>
    <span>Speaking + Writing + Listening</span>
  </div>
</div>
</body>
</html>
