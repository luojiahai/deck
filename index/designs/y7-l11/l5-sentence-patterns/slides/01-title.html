<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L5-01 · Title</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
    overflow: hidden;
  }
  .main {
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .lesson-num {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent-gold);
    text-transform: uppercase;
    margin-bottom: var(--space-md);
  }
  .title-cn {
    font-family: var(--font-display);
    font-size: 120px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .title-cn .mark {
    color: var(--accent-gold);
  }
  .title-en {
    font-size: 32px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-bottom: var(--space-xl);
  }
  .meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-size: 16px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
  .meta .sep {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent-gold);
  }
  .swap-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin: 0 auto var(--space-lg);
  }
  .swap-chip {
    border: 4px solid var(--accent-gold-dim);
    border-radius: 999px;
    padding: 14px 32px;
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 900;
    color: var(--text-secondary);
  }
  .swap-chip.q { color: var(--accent-gold); border-color: var(--accent-gold); }
  .swap-arrow {
    font-size: 40px;
    color: var(--accent-gold);
    font-weight: 700;
  }
  .clock-watermark { right: 80px; bottom: -60px; }
</style>
</head>
<body>

<div class="main">
  <div class="swap-icon">
    <div class="swap-chip">我…。</div>
    <div class="swap-arrow">&#8646;</div>
    <div class="swap-chip q">你…？</div>
  </div>
  <div class="lesson-num">Lesson 5 · Y7 Unit 4</div>
  <h1 class="title-cn">陈述 <span class="mark">&#8646;</span> 疑问</h1>
  <div class="title-en">Sentence Patterns · Statements &amp; Questions</div>
  <div class="meta">
    <span>Year 7 Chinese</span>
    <span class="sep"></span>
    <span>50 mins</span>
    <span class="sep"></span>
    <span>Speaking + Writing</span>
  </div>
</div>

<div class="clock-watermark"></div>
</body>
</html>
