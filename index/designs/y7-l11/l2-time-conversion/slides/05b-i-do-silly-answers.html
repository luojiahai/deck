<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L2-05b · Spot the Silly Sentence · Answer</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content: center; align-items: center; text-align: center; padding: 60px 140px; }
  .section-label { font-size: 16px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 12px; }
  .main-title { font-family: var(--font-display); font-size: 46px; font-weight: 900; margin-bottom: 24px; }

  .reveal-badge {
    display: inline-block;
    background: var(--accent-gold);
    color: #fff;
    padding: 8px 26px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 24px;
  }

  .pair-row { display: flex; align-items: center; justify-content: center; gap: 32px; margin-bottom: 24px; }
  .pair-card {
    border-radius: var(--radius-lg);
    padding: 28px 40px;
  }
  .pair-card.wrong { background: var(--accent-coral-dim); border: 2px solid var(--accent-coral); }
  .pair-card.correct { background: var(--accent-teal-dim); border: 2px solid var(--accent-teal); }
  .pair-card .label { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .pair-card.wrong .label { color: var(--accent-coral); }
  .pair-card.correct .label { color: var(--accent-teal); }
  .pair-card .hz { font-family: var(--font-display); font-size: 40px; font-weight: 900; }
  .pair-card.wrong .hz { color: var(--accent-coral); text-decoration: line-through; }
  .pair-card.correct .hz { color: var(--accent-teal); }
  .arrow { font-size: 32px; color: var(--text-muted); }

  .explain-box {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 20px 36px;
    font-size: 20px;
    color: var(--text-primary);
    max-width: 1100px;
    line-height: 1.6;
  }
  .explain-box b { color: var(--accent-coral); }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L2 · 时间换算</span>
  <span class="sep"></span>
  <span class="section-name">I Do · Silly Sentence · Answer · 10–20 min</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content">
  <div class="section-label">10–20 min · I Do · Discuss</div>
  <div class="main-title">找找看，哪里怪？· Answer</div>

  <div class="reveal-badge">🔑 Answer Reveal</div>

  <div class="pair-row">
    <div class="pair-card wrong">
      <div class="label">❌ Silly</div>
      <div class="hz">我晚上五点起床。</div>
    </div>
    <div class="arrow">→</div>
    <div class="pair-card correct">
      <div class="label">✅ Fixed</div>
      <div class="hz">我早上七点起床。</div>
    </div>
  </div>

  <div class="explain-box">
    <b>晚上</b> means <b>evening</b> — not when most people get up! Most people 起床 (get up) in the <b>早上</b>, not the 晚上.
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y7 Chinese · Unit 4 日常起居</span>
</div>

</body>
</html>
