<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L2-07b · Guided Worksheet · Answers</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content: center; padding: 50px 120px; }
  .section-label { font-size: 16px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 10px; }
  .main-title { font-family: var(--font-display); font-size: 44px; font-weight: 900; margin-bottom: 4px; }
  .subtitle { font-size: 18px; color: var(--text-muted); margin-bottom: 22px; }

  .reveal-badge {
    display: inline-block;
    background: var(--accent-gold);
    color: #fff;
    padding: 8px 26px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 22px;
  }

  .item-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .item-card {
    background: var(--accent-teal-dim);
    border: 2px solid var(--accent-teal);
    border-radius: var(--radius-md);
    padding: 22px 16px;
    text-align: center;
    position: relative;
  }
  .item-card.modeled { border-color: var(--accent-gold); background: var(--accent-gold-dim); }
  .item-card .modeled-badge {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    background: var(--accent-gold); color: #fff;
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    padding: 3px 14px; border-radius: 999px;
  }
  .item-card .q-num { font-size: 13px; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; }
  .item-card .q-time { font-family: var(--font-mono); font-size: 28px; font-weight: 700; color: var(--text-primary); }
  .item-card .q-answer { font-family: var(--font-display); font-size: 26px; font-weight: 900; color: var(--accent-teal); margin-top: 10px; }
  .item-card.modeled .q-answer { color: var(--accent-gold); }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L2 · 时间换算</span>
  <span class="sep"></span>
  <span class="section-name">We Do · Answers · 20–43 min</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content">
  <div class="section-label">20–30 min · We Do · Activity 1 (Ex3, p.80)</div>
  <div class="main-title">Guided Conversion Worksheet · Answers</div>
  <div class="subtitle">答案 · Compare with your partner's answer.</div>

  <div class="reveal-badge">🔑 Answer Key</div>

  <div class="item-grid">
    <div class="item-card modeled">
      <div class="modeled-badge">Modeled</div>
      <div class="q-num">Item 1</div>
      <div class="q-time">07:15</div>
      <div class="q-answer">早上七点一刻</div>
    </div>
    <div class="item-card">
      <div class="q-num">Item 2</div>
      <div class="q-time">11:40</div>
      <div class="q-answer">上午十一点四十分</div>
    </div>
    <div class="item-card">
      <div class="q-num">Item 3</div>
      <div class="q-time">12:30</div>
      <div class="q-answer">中午十二点半</div>
    </div>
    <div class="item-card">
      <div class="q-num">Item 4</div>
      <div class="q-time">16:00</div>
      <div class="q-answer">下午四点</div>
    </div>
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y7 Chinese · Unit 4 日常起居</span>
</div>

</body>
</html>
