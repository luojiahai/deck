<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L3-05b · CFU Checkpoints · Answers</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content: center; padding: 60px 140px; }
  .section-label { font-size: 16px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 12px; }
  .main-title { font-family: var(--font-display); font-size: 52px; font-weight: 900; margin-bottom: 36px; }
  .reveal-badge { display: inline-block; background: var(--accent-gold); color: #fff; padding: 8px 28px; border-radius: 999px; font-size: 15px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 24px; }
  .cfu-list { display: flex; flex-direction: column; gap: 22px; max-width: 1400px; }
  .cfu-item {
    display: flex; align-items: center; gap: 24px;
    background: #fff;
    border: 2px solid var(--accent-gold);
    border-radius: var(--radius-md);
    padding: 26px 34px;
  }
  .cfu-num { font-size: 48px; font-weight: 900; color: var(--accent-gold-dim); font-family: var(--font-display); width: 60px; text-align: center; flex-shrink: 0; }
  .cfu-q { font-size: 26px; color: var(--text-primary); flex: 1; line-height: 1.5; }
  .cfu-q .zh { font-family: var(--font-display); font-weight: 700; color: var(--accent-teal); }
  .cfu-a {
    font-family: var(--font-display);
    font-size: 40px; font-weight: 900;
    color: var(--accent-gold);
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .cfu-a .check { font-size: 24px; }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L3 · 部首拼音</span>
  <span class="sep"></span>
  <span class="section-name">I Do · CFU · Answers</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content">
  <div class="section-label">Answer Check</div>
  <div class="main-title">Check for Understanding: Answers · 答案</div>
  <div class="reveal-badge">🔑 Answer Key</div>

  <div class="cfu-list">
    <div class="cfu-item">
      <div class="cfu-num">1</div>
      <div>
        <div class="cfu-q">Which radical means <strong>"grass"</strong>?</div>
      </div>
      <div class="cfu-a"><span class="check">✅</span> 艹</div>
    </div>
    <div class="cfu-item">
      <div class="cfu-num">2</div>
      <div>
        <div class="cfu-q">Teacher shows <span class="zh">颜</span> highlighted — which radical is inside?</div>
      </div>
      <div class="cfu-a"><span class="check">✅</span> 页</div>
    </div>
    <div class="cfu-item">
      <div class="cfu-num">3</div>
      <div>
        <div class="cfu-q"><span class="zh">起</span> has which radical?</div>
      </div>
      <div class="cfu-a"><span class="check">✅</span> 走</div>
    </div>
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y7 Chinese · Unit 4 日常起居</span>
</div>

</body>
</html>
