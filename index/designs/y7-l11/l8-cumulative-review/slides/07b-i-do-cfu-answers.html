<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L8-07b · CFU Checkpoints · Answers</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content: center; padding: 60px 140px; }
  .section-label { font-size: 16px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 12px; }
  .main-title { font-family: var(--font-display); font-size: 50px; font-weight: 900; margin-bottom: 32px; }
  .cfu-list { display: flex; flex-direction: column; gap: 20px; max-width: 1600px; }
  .cfu-item {
    display: flex; align-items: center; gap: 20px;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 24px 32px;
  }
  .cfu-num { font-size: 46px; font-weight: 900; color: var(--accent-gold-dim); font-family: var(--font-display); width: 60px; text-align: center; flex-shrink: 0; }
  .cfu-q { font-size: 24px; color: var(--text-primary); flex: 1.4; }
  .cfu-a { font-size: 24px; color: var(--accent-teal); font-weight: 700; text-align: right; flex: 1; font-family: var(--font-display); }
  .cfu-item.error .cfu-a { color: var(--accent-coral); font-family: var(--font-body); font-size: 19px; }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L8 · 复习</span>
  <span class="sep"></span>
  <span class="section-name">I Do · CFU · Answers · 10–20 min</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content">
  <div class="section-label">10–20 min · CFU Checkpoints</div>
  <div class="main-title">Check for Understanding</div>

  <div class="cfu-list">
    <div class="cfu-item">
      <div class="cfu-num">1</div>
      <div class="cfu-q">Translate: "I read books in the evening."</div>
      <div class="cfu-a">我晚上看书。</div>
    </div>
    <div class="cfu-item error">
      <div class="cfu-num">2</div>
      <div class="cfu-q">What's wrong with 我打篮球下午?</div>
      <div class="cfu-a">❌ Time must come before the verb — 我下午打篮球。</div>
    </div>
    <div class="cfu-item">
      <div class="cfu-num">3</div>
      <div class="cfu-q">Translate: "I do homework every day."</div>
      <div class="cfu-a">我每天做作业。</div>
    </div>
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y7 Chinese · Unit 4 日常起居</span>
</div>

</body>
</html>
