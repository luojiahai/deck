<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L4-03 · Review: Time Conversion</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content: center; padding: 60px 120px; }
  .section-label { font-size: 16px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent-teal); text-transform: uppercase; margin-bottom: 12px; }
  .main-title { font-family: var(--font-display); font-size: 52px; font-weight: 900; margin-bottom: 8px; }
  .subtitle { font-size: 20px; color: var(--text-muted); margin-bottom: 36px; }
  .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; max-width: 1200px; margin: 0 auto; }
  .time-card { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 32px 20px; text-align: center; }
  .time-digital { font-family: var(--font-mono); font-size: 64px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; }
  .time-arrow { font-size: 24px; color: var(--accent-gold); margin: 12px 0; }
  .time-prompt { font-size: 17px; color: var(--text-muted); }
  .cold-call { margin-top: 36px; display: flex; align-items: center; justify-content: center; gap: 16px; font-size: 18px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L4 · 起居动词</span>
  <span class="sep"></span>
  <span class="section-name">Review · 0–8 min</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content">
  <div class="section-label">Review Part B — 4 min</div>
  <div class="main-title">Time Conversion Sprint · 时间转换</div>
  <div class="subtitle">Teacher says a digital time. Convert to Chinese, write it, hold it up!</div>

  <div class="time-grid">
    <div class="time-card">
      <div class="time-digital">6:30</div>
      <div class="time-arrow">↓</div>
      <div class="time-prompt">Write it in Chinese</div>
    </div>
    <div class="time-card">
      <div class="time-digital">7:15</div>
      <div class="time-arrow">↓</div>
      <div class="time-prompt">Write it in Chinese</div>
    </div>
    <div class="time-card">
      <div class="time-digital">9:45</div>
      <div class="time-arrow">↓</div>
      <div class="time-prompt">Write it in Chinese</div>
    </div>
  </div>

  <div class="cold-call">🎯 Cold call to check — no notes!</div>
</div>

<div class="slide-footer">
  <span class="brand">Y7 Chinese · Unit 4 日常起居</span>
</div>

</body>
</html>
