<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L1-01 · Title</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
    overflow: hidden;
  }
  .main {
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .lesson-num {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent-gold);
    text-transform: uppercase;
    margin-bottom: var(--space-md);
  }
  .title-cn {
    font-family: var(--font-display);
    font-size: 118px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .title-cn .dot {
    color: var(--accent-gold);
  }
  .title-en {
    font-size: 32px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-bottom: var(--space-xl);
  }
  .meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-size: 16px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
  .meta .sep {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent-gold);
  }
  .sunarc-icon {
    width: 220px; height: 110px;
    position: relative;
    margin: 0 auto var(--space-lg);
  }
  .sunarc-icon .arc {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 110px;
    border: 4px solid var(--accent-gold-dim);
    border-bottom: none;
    border-radius: 120px 120px 0 0;
  }
  .sunarc-icon .sun {
    position: absolute;
    top: 4px; left: 50%;
    transform: translateX(-50%);
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent-gold);
    box-shadow: 0 0 0 9px var(--accent-gold-dim);
  }
  .sunarc-icon .baseline {
    position: absolute;
    bottom: 0; left: -16px; right: -16px;
    height: 2px;
    background: var(--border-medium);
  }
  .sunarc-watermark {
    position: absolute;
    right: -20px; bottom: 40px;
    width: 480px; height: 240px;
    border: 3px solid var(--border-light);
    border-bottom: none;
    border-radius: 260px 260px 0 0;
    opacity: 0.4;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="main">
  <div class="sunarc-icon"><div class="arc"></div><div class="sun"></div><div class="baseline"></div></div>
  <div class="lesson-num">Lesson 1 · Y7 Unit 4</div>
  <h1 class="title-cn">早上<span class="dot">？</span>上午<span class="dot">？</span></h1>
  <div class="title-en">Time-of-Day Vocabulary + Greetings · 时间词与问候语</div>
  <div class="meta">
    <span>Year 7 Chinese</span>
    <span class="sep"></span>
    <span>50 mins</span>
    <span class="sep"></span>
    <span>Writing + Speaking</span>
  </div>
</div>

<div class="sunarc-watermark"></div>
</body>
</html>
