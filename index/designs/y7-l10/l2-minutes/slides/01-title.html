<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L2-01 · Title</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
    overflow: hidden;
  }
  .main {
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .lesson-num {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent-gold);
    text-transform: uppercase;
    margin-bottom: var(--space-md);
  }
  .title-cn {
    font-family: var(--font-display);
    font-size: 140px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .title-cn .dot {
    color: var(--accent-gold);
  }
  .title-en {
    font-size: 32px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-bottom: var(--space-xl);
  }
  .meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-size: 16px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
  .meta .sep {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent-gold);
  }
  .clock-icon {
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 4px solid var(--accent-gold-dim);
    margin: 0 auto var(--space-lg);
    position: relative;
  }
  .clock-icon::before {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    background: var(--accent-gold);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
  }
  .clock-icon .hand-h {
    position: absolute;
    width: 3px; height: 45px;
    background: var(--text-primary);
    border-radius: 2px;
    bottom: 50%; left: 50%;
    transform-origin: bottom center;
    transform: translateX(-50%) rotate(-50deg);
  }
  .clock-icon .hand-m {
    position: absolute;
    width: 2px; height: 62px;
    background: var(--accent-gold);
    border-radius: 1px;
    bottom: 50%; left: 50%;
    transform-origin: bottom center;
    transform: translateX(-50%) rotate(60deg);
  }
  .clock-watermark { right: 80px; bottom: -60px; }
</style>
</head>
<body>

<div class="main">
  <div class="clock-icon"><div class="hand-h"></div><div class="hand-m"></div></div>
  <div class="lesson-num">Lesson 2 · Y7 Unit 4</div>
  <h1 class="title-cn">几点<span class="dot">几分？</span></h1>
  <div class="title-en">Minutes · 分 · X点Y分</div>
  <div class="meta">
    <span>Year 7 Chinese</span>
    <span class="sep"></span>
    <span>50 mins</span>
    <span class="sep"></span>
    <span>Speaking + Listening</span>
  </div>
</div>

<div class="clock-watermark"></div>
</body>
</html>
