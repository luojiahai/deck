<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L2-08b · Lightning Listen Answers</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content: center; padding: 60px 120px; }
  .section-label { font-size: 16px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 12px; }
  .main-title { font-family: var(--font-display); font-size: 48px; font-weight: 900; margin-bottom: 6px; }
  .subtitle { font-size: 19px; color: var(--text-muted); margin-bottom: 28px; }
  .reveal-badge {
    display: inline-block;
    background: var(--accent-gold);
    color: #fff;
    padding: 8px 28px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 24px;
  }
  .answer-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    max-width: 1400px;
  }
  .answer-item {
    background: #fff;
    border-radius: var(--radius-md);
    padding: 20px 16px;
    text-align: center;
    border: 2px solid var(--accent-gold);
    box-shadow: 0 4px 16px rgba(0,0,0,0.04);
  }
  .answer-item .chinese {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .answer-item .arrow-down {
    font-size: 18px;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .answer-item .digits {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--accent-teal);
  }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L2 · MINUTES</span>
  <span class="sep"></span>
  <span class="section-name">Sprint 1 · Answers Reveal</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content">
  <div class="section-label">Answer Check</div>
  <div class="main-title">Lightning Listen: Answers · 答案</div>
  <div class="subtitle">Swap papers and mark! How many did you get out of 8?</div>

  <div class="reveal-badge">🔑 Answer Key</div>

  <div class="answer-grid">
    <div class="answer-item">
      <div class="chinese">三点十分</div>
      <div class="arrow-down">↓</div>
      <div class="digits">3:10</div>
    </div>
    <div class="answer-item">
      <div class="chinese">五点零五分</div>
      <div class="arrow-down">↓</div>
      <div class="digits">5:05</div>
    </div>
    <div class="answer-item">
      <div class="chinese">七点二十分</div>
      <div class="arrow-down">↓</div>
      <div class="digits">7:20</div>
    </div>
    <div class="answer-item">
      <div class="chinese">十二点零一分</div>
      <div class="arrow-down">↓</div>
      <div class="digits">12:01</div>
    </div>
    <div class="answer-item">
      <div class="chinese">九点三十分</div>
      <div class="arrow-down">↓</div>
      <div class="digits">9:30</div>
    </div>
    <div class="answer-item">
      <div class="chinese">两点四十五分</div>
      <div class="arrow-down">↓</div>
      <div class="digits">2:45</div>
    </div>
    <div class="answer-item">
      <div class="chinese">六点零八分</div>
      <div class="arrow-down">↓</div>
      <div class="digits">6:08</div>
    </div>
    <div class="answer-item">
      <div class="chinese">四点十五分</div>
      <div class="arrow-down">↓</div>
      <div class="digits">4:15</div>
    </div>
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y7 Chinese · Unit 4.1 Telling Time</span>
</div>

</body>
</html>
