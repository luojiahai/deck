<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 960pt; height: 540pt;
    overflow: hidden;
    font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, sans-serif;
    color: #1E2A38;
    background: #FEFCF7;
    display: flex; align-items: center; justify-content: center;
  }
  .main { text-align: center; position: relative; z-index: 1; }
  .stars { margin-bottom: 12pt; }
  .stars p { font-size: 18pt; color: #C8943E; margin: 0; letter-spacing: 0.3em; }
  .lesson-num { margin-bottom: 10pt; }
  .lesson-num p { font-size: 10pt; font-weight: 700; letter-spacing: 0.2em; color: #C8943E; margin: 0; }
  .title-cn { margin-bottom: 6pt; }
  .title-cn h1 { font-family: 'Noto Serif SC', serif; font-size: 72pt; font-weight: 900; line-height: 1.1; color: #1E2A38; margin: 0; }
  .title-en { margin-bottom: 28pt; }
  .title-en p { font-size: 16pt; color: #8B94A3; margin: 0; letter-spacing: 0.04em; }
  .meta p { font-size: 9pt; color: #8B94A3; margin: 0; letter-spacing: 0.06em; }
  .rings { position: absolute; top: -60pt; right: -40pt; display: flex; gap: 0; z-index: 0; }
  .ring { width: 80pt; height: 80pt; border-radius: 50%; border: 4pt solid rgba(200,148,62,0.15); position: relative; }
  .ring:nth-child(1) { margin-right: -20pt; }
  .ring:nth-child(2) { margin-right: -20pt; border-color: rgba(58,125,140,0.15); }
  .ring:nth-child(3) { border-color: rgba(212,117,107,0.15); }
</style>
</head>
<body>
<div class="main">
  <div class="stars"><p>&#9733; &#9733; &#9733;</p></div>
  <div class="lesson-num"><p>Lesson 7 · Y7 Unit 4</p></div>
  <div class="title-cn"><h1>时间奥运会</h1></div>
  <div class="title-en"><p>Time Olympics · Mixed Practice · 混合练习</p></div>
  <div class="meta"><p>Year 7 Chinese · 50 mins · Listening + Speaking + Reading + Writing</p></div>
</div>
<div class="rings">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>
</body>
</html>
