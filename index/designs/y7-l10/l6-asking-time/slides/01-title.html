<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L6-01 · Title</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
    overflow: hidden;
  }
  .main {
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .lesson-num {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent-gold);
    text-transform: uppercase;
    margin-bottom: var(--space-md);
  }
  .title-cn {
    font-family: var(--font-display);
    font-size: 140px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .title-cn .mark {
    color: var(--accent-gold);
  }
  .title-en {
    font-size: 32px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-bottom: var(--space-xl);
  }
  .meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-size: 16px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
  .meta .sep {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent-gold);
  }
  .speech-bubble-icon {
    width: 180px; height: 130px;
    border: 4px solid var(--accent-gold-dim);
    border-radius: 40px;
    margin: 0 auto var(--space-lg);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .speech-bubble-icon::after {
    content: '';
    position: absolute;
    bottom: -14px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 16px solid var(--accent-gold-dim);
  }
  .speech-bubble-icon .q-mark {
    font-family: var(--font-display);
    font-size: 56px;
    font-weight: 900;
    color: var(--accent-gold);
  }
  .clock-watermark { right: 80px; bottom: -60px; }
</style>
</head>
<body>

<div class="main">
  <div class="speech-bubble-icon"><span class="q-mark">几点？</span></div>
  <div class="lesson-num">Lesson 6 · Y7 Unit 4</div>
  <h1 class="title-cn">现在几点<span class="mark">？</span></h1>
  <div class="title-en">Asking the Time · Natural Chinese Conversations</div>
  <div class="meta">
    <span>Year 7 Chinese</span>
    <span class="sep"></span>
    <span>50 mins</span>
    <span class="sep"></span>
    <span>Speaking + Listening</span>
  </div>
</div>

<div class="clock-watermark"></div>
</body>
</html>
