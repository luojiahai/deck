<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 960pt; height: 540pt;
    overflow: hidden;
    font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, sans-serif;
    color: #1E2A38;
    background: #FEFCF7;
    display: flex; align-items: center; justify-content: center;
  }
  .main { text-align: center; }
  .speech-wrap {
    position: relative;
    display: inline-block;
    margin: 0 auto 16pt;
  }
  .speech-body {
    width: 110pt; height: 80pt;
    border: 2pt solid rgba(200,148,62,0.2);
    border-radius: 24pt;
    display: flex; align-items: center; justify-content: center;
  }
  .speech-tail {
    width: 0; height: 0;
    border-left: 10pt solid transparent;
    border-right: 10pt solid transparent;
    border-top: 12pt solid rgba(200,148,62,0.2);
    margin: 0 auto;
  }
  .q-mark p { font-family: 'Noto Serif SC', serif; font-size: 36pt; font-weight: 900; color: #C8943E; margin: 0; }
  .lesson-num { margin-bottom: 8pt; }
  .lesson-num p { font-size: 10pt; font-weight: 700; letter-spacing: 0.2em; color: #C8943E; margin: 0; }
  .title-cn { margin-bottom: 4pt; }
  .title-cn h1 { font-family: 'Noto Serif SC', serif; font-size: 72pt; font-weight: 900; line-height: 1.1; color: #1E2A38; margin: 0; }
  .title-en { margin-bottom: 24pt; }
  .title-en p { font-size: 16pt; color: #8B94A3; margin: 0; letter-spacing: 0.04em; }
  .meta p { font-size: 9pt; color: #8B94A3; margin: 0; letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="main">
  <div class="speech-wrap">
    <div class="speech-body"><div class="q-mark"><p>几点？</p></div></div>
    <div class="speech-tail"></div>
  </div>
  <div class="lesson-num"><p>Lesson 6 · Y7 Unit 4</p></div>
  <div class="title-cn"><h1>现在几点？</h1></div>
  <div class="title-en"><p>Asking the Time · Natural Chinese Conversations</p></div>
  <div class="meta"><p>Year 7 Chinese · 50 mins · Speaking + Listening</p></div>
</div>
</body>
</html>
