<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; width: 960pt; height: 540pt; overflow: hidden; font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, sans-serif; color: #1E2A38; background: #FEFCF7; }
  .hdr { position: absolute; top: 0; left: 0; right: 0; height: 36pt; border-bottom: 1pt solid #E5DFD0; display: flex; align-items: center; padding: 0 36pt; }
  .hdr .t { font-size: 7pt; font-weight: 700; letter-spacing: 0.12em; color: #C8943E; margin: 0; }
  .hdr .s { width: 1pt; height: 10pt; background: #E5DFD0; margin: 0 8pt; }
  .hdr .n { font-size: 7pt; color: #5B6677; margin: 0; }
  .hdr .al { position: absolute; top: 0; left: 36pt; right: 36pt; height: 3pt; background: #C8943E; }
  .ftr { position: absolute; bottom: 0; left: 0; right: 0; height: 24pt; border-top: 1pt solid #E5DFD0; display: flex; align-items: center; padding: 0 36pt; }
  .ftr p { font-size: 6pt; color: #8B94A3; margin: 0; }
  .ct { position: absolute; top: 36pt; left: 0; right: 0; bottom: 24pt; padding: 20pt 48pt; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .sl { margin-bottom: 4pt; }
  .sl p { font-size: 8pt; font-weight: 700; letter-spacing: 0.14em; color: #3A7D8C; margin: 0; }
  .r-badge { width: 80pt; height: 80pt; border-radius: 50%; background: rgba(58,125,140,0.08); border: 4pt solid #3A7D8C; display: flex; align-items: center; justify-content: center; margin: 0 auto 16pt; flex-direction: column; }
  .r-badge .rn p { font-family: 'Noto Serif SC', serif; font-size: 32pt; font-weight: 900; color: #3A7D8C; margin: 0; line-height: 1; }
  .r-badge .rl p { font-size: 8pt; font-weight: 700; letter-spacing: 0.1em; color: #3A7D8C; margin: 0; }
  .mt { margin-bottom: 4pt; }
  .mt h2 { font-family: 'Noto Serif SC', serif; font-size: 36pt; font-weight: 900; margin: 0; }
  .st { margin-bottom: 18pt; }
  .st p { font-size: 14pt; color: #8B94A3; margin: 0; }
  .info-grid { display: flex; gap: 16pt; margin-bottom: 16pt; }
  .ic { background: #F6F2E8; border-radius: 8pt; padding: 14pt 20pt; text-align: center; min-width: 100pt; }
  .ic .ico { margin-bottom: 4pt; }
  .ic .ico p { font-size: 24pt; margin: 0; }
  .ic .val p { font-family: 'Noto Serif SC', serif; font-size: 24pt; font-weight: 900; color: #3A7D8C; margin: 0; }
  .ic .desc p { font-size: 8pt; color: #8B94A3; margin: 0; letter-spacing: 0.04em; }
  .dir-hint { display: flex; gap: 12pt; }
  .db { border-radius: 999pt; padding: 6pt 18pt; }
  .db p { font-size: 10pt; font-weight: 700; margin: 0; letter-spacing: 0.04em; }
  .db.en  { background: rgba(58,125,140,0.08); }
  .db.en p  { color: #3A7D8C; }
  .db.zh  { background: rgba(212,117,107,0.08); }
  .db.zh p  { color: #D4756B; }
</style>
</head>
<body>
<div class="hdr"><p class="t">L8 · BEAT THE TEST</p><div class="s"></div><p class="n">Round 2</p><div class="al"></div></div>
<div class="ct">
  <div class="sl"><p>20–30 min · Round 2</p></div>
  <div class="r-badge"><div class="rn"><p>2</p></div><div class="rl"><p>ROUND</p></div></div>
  <div class="mt"><h2>Translation Showdown</h2></div>
  <div class="st"><p>翻译对决</p></div>
  <div class="info-grid">
    <div class="ic"><div class="ico"><p>&#128172;</p></div><div class="val"><p>12</p></div><div class="desc"><p>Questions</p></div></div>
    <div class="ic"><div class="ico"><p>&#9202;</p></div><div class="val"><p>10</p></div><div class="desc"><p>Minutes</p></div></div>
    <div class="ic"><div class="ico"><p>&#11088;</p></div><div class="val"><p>180</p></div><div class="desc"><p>Max Points</p></div></div>
  </div>
  <div class="dir-hint">
    <div class="db en"><p>EN &#8594; 中文</p></div>
    <div class="db zh"><p>中文 &#8594; EN</p></div>
  </div>
</div>
<div class="ftr"><p>Y7 Chinese · Unit 4.1 Telling Time</p></div>
</body>
</html>
