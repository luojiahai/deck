<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 960pt; height: 540pt;
    overflow: hidden;
    font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, sans-serif;
    color: #1E2A38;
    background: #FEFCF7;
    display: flex; align-items: center; justify-content: center;
  }
  .main { text-align: center; position: relative; z-index: 1; }
  .trophy-icon {
    width: 100pt; height: 100pt;
    border-radius: 50%;
    border: 3pt solid #C8943E;
    margin: 0 auto 16pt;
    position: relative;
    background: rgba(200,148,62,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .trophy-icon .inner { font-size: 40pt; }
  .lesson-num { margin-bottom: 8pt; }
  .lesson-num p { font-size: 10pt; font-weight: 700; letter-spacing: 0.2em; color: #C8943E; margin: 0; }
  .title-cn { margin-bottom: 4pt; }
  .title-cn h1 { font-family: 'Noto Serif SC', serif; font-size: 72pt; font-weight: 900; line-height: 1.1; color: #1E2A38; margin: 0; }
  .title-cn h1 .hl { color: #C8943E; }
  .title-en { margin-bottom: 24pt; }
  .title-en p { font-size: 16pt; color: #8B94A3; margin: 0; letter-spacing: 0.04em; }
  .meta p { font-size: 9pt; color: #8B94A3; margin: 0; letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="main">
  <div class="trophy-icon"><div class="inner"><p>&#9200;</p></div></div>
  <div class="lesson-num"><p>Lesson 8 · Y7 Unit 4.1</p></div>
  <div class="title-cn"><h1>考试<span class="hl">大</span>挑战</h1></div>
  <div class="title-en"><p>Beat the Test · Review &amp; Test Preparation</p></div>
  <div class="meta"><p>Year 7 Chinese · 50 mins · Game Show Format</p></div>
</div>
</body>
</html>
