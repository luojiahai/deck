<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; width: 960pt; height: 540pt; overflow: hidden; font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, sans-serif; color: #1E2A38; background: #FEFCF7; }
  .hdr { position: absolute; top: 0; left: 0; right: 0; height: 36pt; border-bottom: 1pt solid #E5DFD0; display: flex; align-items: center; padding: 0 36pt; }
  .hdr .t { font-size: 7pt; font-weight: 700; letter-spacing: 0.12em; color: #C8943E; margin: 0; }
  .hdr .s { width: 1pt; height: 10pt; background: #E5DFD0; margin: 0 8pt; }
  .hdr .n { font-size: 7pt; color: #5B6677; margin: 0; }
  .hdr .al { position: absolute; top: 0; left: 36pt; right: 36pt; height: 3pt; background: #C8943E; }
  .ftr { position: absolute; bottom: 0; left: 0; right: 0; height: 24pt; border-top: 1pt solid #E5DFD0; display: flex; align-items: center; padding: 0 36pt; }
  .ftr p { font-size: 6pt; color: #8B94A3; margin: 0; }
  .ct { position: absolute; top: 36pt; left: 0; right: 0; bottom: 24pt; padding: 24pt 56pt; display: flex; flex-direction: column; justify-content: center; }
  .sl { margin-bottom: 6pt; }
  .sl p { font-size: 8pt; font-weight: 700; letter-spacing: 0.14em; color: #C8943E; margin: 0; }
  .mt { margin-bottom: 16pt; }
  .mt h2 { font-family: 'Noto Serif SC', serif; font-size: 24pt; font-weight: 900; margin: 0; }
  .vocab-card { background: #fff; border: 1.5pt solid #C8943E; border-radius: 10pt; padding: 20pt 28pt; display: flex; align-items: center; gap: 24pt; }
  .hanzi { }
  .hanzi h1 { font-family: 'Noto Serif SC', serif; font-size: 56pt; font-weight: 900; color: #C8943E; margin: 0; line-height: 1; }
  .info {}
  .info p { margin: 0; }
  .py { font-size: 16pt; color: #5B6677; }
  .en { font-size: 12pt; color: #8B94A3; }
  .note { font-size: 9pt; color: #D4756B; }
  .context { margin-top: 16pt; }
  .context p { font-size: 11pt; color: #5B6677; margin: 0; }
</style>
</head>
<body>
<div class="hdr"><p class="t">L1 · O'CLOCK</p><div class="s"></div><p class="n">I Do · New Vocabulary</p><div class="al"></div></div>
<div class="ct">
  <div class="sl"><p>12–20 min · I Do</p></div>
  <div class="mt"><h2>New Vocabulary · 新词汇</h2></div>
  <div class="vocab-card">
    <div class="hanzi"><h1>点</h1></div>
    <div class="info">
      <p class="py">diǎn</p>
      <p class="en">o'clock</p>
      <p class="note">9 strokes · radical: 灬 (huǒ)</p>
    </div>
  </div>
  <div class="context"><p>The character 点 literally means "dot" or "point". When telling time, it marks the exact hour — just like "o'clock" in English.</p></div>
</div>
<div class="ftr"><p>Y7 Chinese · Unit 4.1 Telling Time</p></div>
</body>
