<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; width: 960pt; height: 540pt; overflow: hidden; font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, sans-serif; color: #1E2A38; background: #FEFCF7; display: flex; align-items: center; justify-content: center; text-align: center; }
  .main {}
  .check-mark { margin-bottom: 6pt; }
  .check-mark h1 { font-family: 'Noto Serif SC', serif; font-size: 56pt; color: #C8943E; margin: 0; line-height: 1; }
  .mt { margin-bottom: 4pt; }
  .mt h2 { font-family: 'Noto Serif SC', serif; font-size: 22pt; font-weight: 900; margin: 0; }
  .st { margin-bottom: 18pt; }
  .st p { font-size: 11pt; color: #5B6677; margin: 0; line-height: 1.5; }
  .next-box { background: rgba(58,125,140,0.1); border: 1.5pt solid #3A7D8C; border-radius: 8pt; padding: 14pt 24pt; text-align: center; margin-bottom: 14pt; }
  .nl { margin-bottom: 4pt; }
  .nl p { font-size: 7pt; font-weight: 700; letter-spacing: 0.1em; color: #3A7D8C; margin: 0; }
  .nt { }
  .nt p { font-family: 'Noto Serif SC', serif; font-size: 20pt; font-weight: 900; color: #1E2A38; margin: 0; }
  .ns { margin-top: 3pt; }
  .ns p { font-size: 10pt; color: #5B6677; margin: 0; }
  .learned p { font-size: 11pt; color: #8B94A3; margin: 0; }
</style>
</head>
<body>
<div class="main">
  <div class="check-mark"><h1>✓</h1></div>
  <div class="mt"><h2>Great work today!</h2></div>
  <div class="st"><p>You can now say o'clock times in Chinese. Remember: 两点 not 二点!</p></div>
  <div class="next-box">
    <div class="nl"><p>Next Lesson →</p></div>
    <div class="nt"><p>Minutes · 分</p></div>
    <div class="ns"><p>X点Y分 — telling time with hours AND minutes</p></div>
  </div>
  <div class="learned"><p>Today: 点 (diǎn) = o'clock · Next: 分 (fēn) = minutes</p></div>
</div>
</body>
</html>
