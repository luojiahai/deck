<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L1-12 · Preview</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content: center; align-items: center; text-align: center; padding: 60px 120px; }
  .check-mark {
    font-family: var(--font-display);
    font-size: 140px;
    color: var(--accent-gold);
    line-height: 1;
    margin-bottom: 12px;
  }
  .main-title { font-family: var(--font-display); font-size: 52px; font-weight: 900; margin-bottom: 8px; }
  .subtitle { font-size: 22px; color: var(--text-secondary); margin-bottom: 40px; line-height: 1.6; }
  .next-box {
    background: var(--accent-teal-dim);
    border: 2px solid var(--accent-teal);
    border-radius: var(--radius-lg);
    padding: 32px 48px;
    max-width: 800px;
    text-align: center;
  }
  .next-box .next-label {
    font-size: 14px; font-weight: 700; letter-spacing: 0.1em; color: var(--accent-teal); text-transform: uppercase; margin-bottom: 8px;
  }
  .next-box .next-title {
    font-family: var(--font-display);
    font-size: 44px; font-weight: 900;
    color: var(--text-primary);
  }
  .next-box .next-sub {
    font-size: 20px; color: var(--text-secondary); margin-top: 6px;
  }
  .learned { margin-top: 32px; font-size: 22px; color: var(--text-muted); }
  .learned .em { color: var(--accent-gold); font-weight: 700; }
</style>
</head>
<body>

<div class="slide-content">
  <div class="check-mark">✓</div>
  <div class="main-title">Great work today!</div>
  <div class="subtitle">You can now say o'clock times in Chinese.<br>Remember: <span style="color:var(--accent-coral);font-weight:700;">两点 not 二点!</span></div>

  <div class="next-box">
    <div class="next-label">Next Lesson →</div>
    <div class="next-title">Minutes · 分</div>
    <div class="next-sub">X点Y分 — telling time with hours AND minutes</div>
  </div>

  <div class="learned">
    Today: <span class="em">点 (diǎn)</span> = o'clock<br>
    Next: <span class="em">分 (fēn)</span> = minutes
  </div>
</div>

</body>
</html>
