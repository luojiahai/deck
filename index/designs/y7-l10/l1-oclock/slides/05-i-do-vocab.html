<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L1-05 · I Do: New Vocabulary</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content: center; padding: 60px 140px; }
  .section-label { font-size: 16px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 12px; }
  .main-title { font-family: var(--font-display); font-size: 52px; font-weight: 900; margin-bottom: 36px; }
  .vocab-card {
    background: #fff;
    border: 2px solid var(--accent-gold);
    border-radius: var(--radius-xl);
    padding: 40px 60px;
    display: flex;
    align-items: center;
    gap: 48px;
    max-width: 800px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.04);
  }
  .hanzi {
    font-family: var(--font-display);
    font-size: 120px;
    font-weight: 900;
    color: var(--accent-gold);
    line-height: 1;
  }
  .vocab-info { display: flex; flex-direction: column; gap: 8px; }
  .pinyin { font-size: 32px; color: var(--text-secondary); }
  .english { font-size: 24px; color: var(--text-muted); }
  .note { font-size: 18px; color: var(--accent-coral); font-weight: 500; margin-top: 4px; }
  .context { margin-top: 32px; font-size: 22px; color: var(--text-secondary); max-width: 800px; line-height: 1.7; }
  .context .em { color: var(--accent-gold); font-weight: 700; }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L1 · O'CLOCK</span>
  <span class="sep"></span>
  <span class="section-name">I Do · New Vocabulary</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content">
  <div class="section-label">12–20 min · I Do</div>
  <div class="main-title">New Vocabulary · 新词汇</div>

  <div class="vocab-card">
    <div class="hanzi">点</div>
    <div class="vocab-info">
      <div class="pinyin">diǎn</div>
      <div class="english">o'clock</div>
      <div class="note">9 strokes · 部首：灬 (huǒ)</div>
    </div>
  </div>

  <div class="context">
    The character <span class="em">点</span> literally means "dot" or "point".<br>
    When telling time, it marks the <span class="em">exact hour</span> — just like "o'clock" in English.
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y7 Chinese · Unit 4.1 Telling Time</span>
</div>
