<!DOCTYPE html>

<title>L8-12 · Preview</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content:center; align-items:center; padding:60px 140px; text-align:center; }
  .preview-eyebrow { font-size:15px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent-gold); margin-bottom:20px; }

  .preview-big-card .card-en { font-size:18px; color:var(--text-secondary); line-height:1.5; }
