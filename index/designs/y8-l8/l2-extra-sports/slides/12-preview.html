<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L2-12 · Preview</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content:center; align-items:center; padding:60px 140px; text-align:center; }
  .preview-eyebrow { font-size:15px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent-gold); margin-bottom:16px; }
  .preview-title { font-family:var(--font-display); font-size:50px; font-weight:900; color:var(--text-primary); margin-bottom:8px; line-height:1.15; }
  .preview-sub { font-size:24px; color:var(--text-muted); margin-bottom:52px; }
  .preview-cards { display:flex; gap:24px; justify-content:center; }
  .preview-card { background:var(--bg-secondary); border-radius:var(--radius-lg); border:1px solid var(--border-light); padding:28px 32px; width:260px; text-align:center; }
  .preview-card .icon { font-size:48px; margin-bottom:14px; }
  .preview-card .card-zh { font-family:var(--font-display); font-size:22px; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
  .preview-card .card-en { font-size:15px; color:var(--text-muted); }
  .preview-pattern { margin-top:44px; background:var(--bg-tertiary); border-radius:var(--radius-lg); padding:22px 48px; display:inline-block; }
  .preview-pattern .pat-label { font-size:13px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent-gold); margin-bottom:8px; }
  .preview-pattern .pat-text { font-family:var(--font-display); font-size:34px; font-weight:700; color:var(--text-primary); }
  .preview-pattern .pat-en { font-size:17px; color:var(--text-secondary); margin-top:6px; }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L2 · MORE SPORTS</span>
  <span class="sep"></span>
  <span class="section-name">Preview · Next Lesson</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content">
  <div class="preview-eyebrow">Coming Up Next · L3</div>
  <div class="preview-title">A Family's Sports Story</div>
  <div class="preview-sub">+ practising the tricky ou / uo sounds</div>

  <div class="preview-cards">
    <div class="preview-card">
      <div class="icon">📖</div>
      <div class="card-zh">课文</div>
      <div class="card-en">Read Gao Li's family sports story</div>
    </div>
    <div class="preview-card">
      <div class="icon">👂</div>
      <div class="card-zh">语音</div>
      <div class="card-en">Practise ou / uo sounds</div>
    </div>
  </div>

  <div class="preview-pattern">
    <div class="pat-label">Pronunciation Focus</div>
    <div class="pat-text">ou <span style="color:var(--accent-gold)">vs</span> uo</div>
    <div class="pat-en">Two commonly confused vowel sounds in Mandarin</div>
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y8 Chinese · Unit 3 Hobbies 爱好</span>
</div>

</body>
</html>
