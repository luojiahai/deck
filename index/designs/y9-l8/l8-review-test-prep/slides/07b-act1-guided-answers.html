<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L8-07b · Guided Measure-Word Answers</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content:flex-start; padding:36px 100px 32px; }
  .page-label {
    font-size:13px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--accent-gold); margin-bottom:6px;
  }
  .main-title {
    font-family:var(--font-display); font-size:42px; font-weight:900;
    color:var(--text-primary); margin-bottom:26px;
  }

  .answers-grid {
    display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:20px;
  }
  .answer-card {
    background:var(--accent-gold-dim);
    border:2px solid var(--accent-gold);
    border-radius:var(--radius-lg);
    padding:22px 20px;
    display:flex; flex-direction:column; align-items:center; gap:12px;
    text-align:center;
  }
  .answer-item {
    font-family:var(--font-display); font-size:34px; font-weight:900;
    color:var(--text-primary);
  }
  .answer-mw { color:var(--accent-gold); }
  .answer-reason { font-size:15px; color:var(--text-secondary); line-height:1.4; }
  .answer-reason .cn { font-family:var(--font-display); font-weight:700; color:var(--accent-gold); }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L8 · 综合复习</span>
  <span class="sep"></span>
  <span class="section-name">We Do · Activity 1 量词书写练习 ↳</span>
  <div class="accent-line" style="background:var(--accent-gold);"></div>
</div>

<div class="slide-content">
  <div class="page-label">Answers Revealed · 答案</div>
  <div class="main-title">答案 · 量词书写练习（引导）</div>

  <div class="answers-grid">

    <div class="answer-card">
      <div class="answer-item">一<span class="answer-mw">条</span>鱼</div>
      <div class="answer-reason">鱼 → 条</div>
    </div>

    <div class="answer-card">
      <div class="answer-item">一<span class="answer-mw">辆</span>车</div>
      <div class="answer-reason"><span class="cn">"车"是交通工具，交通工具用"辆"。</span></div>
    </div>

    <div class="answer-card">
      <div class="answer-item">一<span class="answer-mw">顶</span>帽子</div>
      <div class="answer-reason">帽子 → 顶</div>
    </div>

    <div class="answer-card">
      <div class="answer-item">一<span class="answer-mw">幢</span>教学楼</div>
      <div class="answer-reason">教学楼 → 幢</div>
    </div>

  </div>

</div>

<div class="slide-footer">
  <span class="brand">Y9 Chinese · Unit 3 学校设施</span>
</div>

</body>
</html>
