<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L5-02b · Review Answers</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content:flex-start; padding:36px 100px 32px; }
  .section-label { font-size:16px; font-weight:700; letter-spacing:0.14em; color:var(--accent-gold); text-transform:uppercase; margin-bottom:10px; }
  .main-title { font-family:var(--font-display); font-size:46px; font-weight:900; margin-bottom:28px; }

  .answers-list { display:flex; flex-direction:column; gap:20px; max-width:1100px; }
  .answer-item { display:grid; grid-template-columns:auto 1fr; gap:24px; align-items:start; background:var(--bg-secondary); border-radius:var(--radius-lg); border:1px solid var(--border-light); padding:24px 28px; }
  .answer-num { width:44px; height:44px; border-radius:50%; background:var(--accent-gold); color:#fff; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; flex-shrink:0; }
  .answer-body .q { font-size:18px; color:var(--text-muted); margin-bottom:10px; }
  .answer-body .q .wrong { font-family:var(--font-display); color:var(--accent-coral); text-decoration:line-through; }
  .answer-body .answer-box { background:var(--accent-gold-dim); border:2px solid var(--accent-gold); border-radius:var(--radius-md); padding:14px 22px; display:inline-block; }
  .answer-body .answer-zh { font-family:var(--font-display); font-size:30px; font-weight:900; color:var(--text-primary); }
  .answer-body .answer-zh .key { color:var(--accent-gold); text-decoration:underline; }
  .answer-body .tick { font-size:22px; margin-right:8px; }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L5 · 上下前后</span>
  <span class="sep"></span>
  <span class="section-name">Review · Answers ↳</span>
  <div class="accent-line" style="background:var(--accent-gold);"></div>
</div>

<div class="slide-content">
  <div class="section-label">Answers Revealed · 答案</div>
  <div class="main-title">答案 · Error Correction</div>

  <div class="answers-list">
    <div class="answer-item">
      <div class="answer-num">1</div>
      <div class="answer-body">
        <div class="q">Fix: <span class="wrong">图书馆旁边在礼堂。</span></div>
        <div class="answer-box">
          <div class="answer-zh"><span class="tick">✅</span> 图书馆在礼堂<span class="key">的旁边</span>。</div>
        </div>
      </div>
    </div>
    <div class="answer-item">
      <div class="answer-num">2</div>
      <div class="answer-body">
        <div class="q">Fix: <span class="wrong">操场左边在体育馆。</span></div>
        <div class="answer-box">
          <div class="answer-zh"><span class="tick">✅</span> 操场在体育馆<span class="key">的左边</span>。</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y9 Chinese · Unit 3 学校设施</span>
</div>

</body>
</html>
