<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L4-10b · Game Answers</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content:flex-start; padding:34px 100px 30px; }
  .section-label { font-size:16px; font-weight:700; letter-spacing:0.14em; color:var(--accent-gold); text-transform:uppercase; margin-bottom:10px; }
  .main-title { font-family:var(--font-display); font-size:46px; font-weight:900; margin-bottom:26px; }

  .answers-list { display:flex; flex-direction:column; gap:18px; max-width:1100px; }
  .answer-item { display:grid; grid-template-columns:auto 1fr; gap:22px; align-items:center; background:var(--bg-secondary); border-radius:var(--radius-lg); border:1px solid var(--border-light); padding:20px 26px; }
  .answer-num { width:40px; height:40px; border-radius:50%; background:var(--accent-gold); color:#fff; display:flex; align-items:center; justify-content:center; font-size:19px; font-weight:900; flex-shrink:0; }
  .answer-body { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
  .answer-body .wrong { font-family:var(--font-display); font-size:22px; font-weight:700; color:var(--accent-coral); text-decoration:line-through; }
  .answer-body .arrow { font-size:18px; color:var(--text-muted); }
  .answer-body .right { font-family:var(--font-display); font-size:26px; font-weight:900; color:var(--accent-teal); }
  .note { font-size:15px; color:var(--text-muted); margin-top:24px; }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L4 · 位置词</span>
  <span class="sep"></span>
  <span class="section-name">Game · Answers ↳</span>
  <div class="accent-line" style="background:var(--accent-gold);"></div>
</div>

<div class="slide-content">
  <div class="section-label">Answers Revealed · 答案</div>
  <div class="main-title">答案 · 改错句接力赛</div>

  <div class="answers-list">
    <div class="answer-item">
      <div class="answer-num">1</div>
      <div class="answer-body">
        <div class="wrong">操场旁边在游泳池。</div>
        <div class="arrow">→</div>
        <div class="right">✅ 操场在游泳池的旁边。</div>
      </div>
    </div>
    <div class="answer-item">
      <div class="answer-num">2</div>
      <div class="answer-body">
        <div class="wrong">校医室隔壁在办公室。</div>
        <div class="arrow">→</div>
        <div class="right">✅ 校医室在办公室的隔壁。</div>
      </div>
    </div>
    <div class="answer-item">
      <div class="answer-num">3</div>
      <div class="answer-body">
        <div class="wrong">停车场左边在教学楼。</div>
        <div class="arrow">→</div>
        <div class="right">✅ 停车场在教学楼的左边。</div>
      </div>
    </div>
  </div>

  <div class="note">Teacher: prepare rounds 4–8 in this same style (new sentences, not reused from Activity 1) before the lesson.</div>
</div>

<div class="slide-footer">
  <span class="brand">Y9 Chinese · Unit 3 学校设施</span>
</div>

</body>
</html>
