<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L6-05b · CFU Checkpoints · Answers</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content: center; padding: 60px 140px; }
  .section-label { font-size: 16px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 12px; }
  .main-title { font-family: var(--font-display); font-size: 52px; font-weight: 900; margin-bottom: 32px; }
  .cfu-list { display: flex; flex-direction: column; gap: 18px; max-width: 1500px; }
  .cfu-item {
    display: flex; align-items: center; gap: 20px;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 22px 32px;
  }
  .cfu-num { font-size: 42px; font-weight: 900; color: var(--accent-gold-dim); font-family: var(--font-display); width: 56px; text-align: center; flex-shrink: 0; }
  .cfu-q { font-size: 21px; color: var(--text-primary); flex: 1.4; }
  .cfu-q .hanzi { font-family: var(--font-display); font-weight: 700; }
  .cfu-a { font-size: 22px; color: var(--accent-teal); font-weight: 700; text-align: right; flex: 1; font-family: var(--font-display); }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L6 · 采访同伴</span>
  <span class="sep"></span>
  <span class="section-name">I Do · CFU · Answers · 10–20 min</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content">
  <div class="section-label">10–20 min · CFU Checkpoints</div>
  <div class="main-title">Check for Understanding</div>

  <div class="cfu-list">
    <div class="cfu-item">
      <div class="cfu-num">1</div>
      <div class="cfu-q">"What time do you get up?"</div>
      <div class="cfu-a">你几点起床？</div>
    </div>
    <div class="cfu-item">
      <div class="cfu-num">2</div>
      <div class="cfu-q"><span class="hanzi">起床</span> means "get up".</div>
      <div class="cfu-a">✅ 👍 correct</div>
    </div>
    <div class="cfu-item">
      <div class="cfu-num">3</div>
      <div class="cfu-q"><span class="hanzi">坐地铁</span> — English?</div>
      <div class="cfu-a">take the subway</div>
    </div>
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y7 Chinese · Unit 4.3 交通工具</span>
