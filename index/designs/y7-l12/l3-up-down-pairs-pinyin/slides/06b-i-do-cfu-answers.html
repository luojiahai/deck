<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L3-06b · CFU Checkpoints · Answers</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content: center; padding: 60px 140px; }
  .section-label { font-size: 16px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 12px; }
  .main-title { font-family: var(--font-display); font-size: 52px; font-weight: 900; margin-bottom: 32px; }
  .reveal-badge { display: inline-block; background: var(--accent-gold); color: #fff; padding: 8px 28px; border-radius: 999px; font-size: 15px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 24px; }
  .cfu-list { display: flex; flex-direction: column; gap: 20px; max-width: 1500px; }
  .cfu-item {
    display: flex; align-items: center; gap: 20px;
    background: #fff;
    border: 2px solid var(--accent-gold);
    border-radius: var(--radius-md);
    padding: 24px 32px;
  }
  .cfu-num { font-size: 42px; font-weight: 900; color: var(--accent-gold-dim); font-family: var(--font-display); width: 56px; text-align: center; flex-shrink: 0; }
  .cfu-q { font-size: 22px; color: var(--text-primary); flex: 1.4; }
  .cfu-q .zh { font-family: var(--font-display); font-weight: 700; color: var(--accent-teal); }
  .cfu-a { font-size: 21px; color: var(--accent-teal); font-weight: 700; text-align: right; flex: 1; line-height: 1.4; }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L3 · 上下词组</span>
  <span class="sep"></span>
  <span class="section-name">I Do · CFU · Answers</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content">
  <div class="section-label">Answer Check</div>
  <div class="main-title">Check for Understanding: Answers · 答案</div>
  <div class="reveal-badge">🔑 Answer Key</div>

  <div class="cfu-list">
    <div class="cfu-item">
      <div class="cfu-q">Error correction: <span class="zh">「我上学坐校车。」</span></div>
      <div class="cfu-a">我坐校车上学 ✓<br><span style="font-size:14px;color:var(--text-muted);font-weight:400;">坐 + vehicle + activity</span></div>
    </div>
    <div class="cfu-item">
      <div class="cfu-q">Odd one out: 上班/下班, 上车/下车, 上学/放学?</div>
      <div class="cfu-a">上学/放学<br><span style="font-size:14px;color:var(--text-muted);font-weight:400;">uses 放, not 下</span></div>
    </div>
    <div class="cfu-item">
      <div class="cfu-q">"get off the vehicle"</div>
      <div class="cfu-a">下车</div>
    </div>
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y7 Chinese · Unit 4.3 交通工具</span>
</div>

</body>
</html>
