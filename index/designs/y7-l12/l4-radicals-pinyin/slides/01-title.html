<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L4-01 · Title</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
    overflow: hidden;
  }
  .main {
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .mini-road-wrap {
    width: 320px;
    margin: 0 auto var(--space-lg);
    position: relative;
  }
  .mini-road-wrap .vehicle-icon {
    margin: -34px auto 0;
  }
  .badge-row {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: var(--space-lg);
  }
  .lesson-num {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent-gold);
    text-transform: uppercase;
    margin-bottom: var(--space-md);
  }
  .title-cn {
    font-family: var(--font-display);
    font-size: 128px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .title-cn .char-highlight { color: var(--accent-gold); }
  .title-cn .char-highlight2 { color: var(--accent-teal); }
  .title-cn .dot-sep { color: var(--border-medium); padding: 0 6px; }
  .title-en {
    font-size: 30px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-bottom: var(--space-xl);
  }
  .meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-size: 16px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
  .meta .sep {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent-gold);
  }
  .road-watermark {
    right: -40px;
    bottom: 60px;
  }
  .road-watermark2 {
    position: absolute;
    left: -60px;
    top: 90px;
    width: 480px; height: 70px;
    border-top: 3px solid var(--border-light);
    opacity: 0.35;
    pointer-events: none;
  }
  .road-watermark2::before {
    content: '';
    position: absolute;
    top: -3px; left: 0; right: 0; height: 3px;
    background: repeating-linear-gradient(to right, var(--border-medium) 0 26px, transparent 26px 52px);
  }
</style>
</head>
<body>

<div class="road-watermark2"></div>

<div class="main">
  <div class="mini-road-wrap">
    <div class="road-strip"></div>
    <div class="vehicle-icon"><div class="window"></div></div>
  </div>

  <div class="badge-row">
    <span class="badge badge-gold">部首 Radicals</span>
    <span class="badge badge-teal">拼音 Pinyin</span>
  </div>
  <div class="lesson-num">Lesson 4 · Y7 Unit 4.3</div>
  <h1 class="title-cn"><span class="char-highlight">部</span><span class="char-highlight">首</span><span class="dot-sep">·</span><span class="char-highlight2">拼</span><span class="char-highlight2">音</span></h1>
  <div class="title-en">Radicals + Pinyin Listening · 6个新部首 &amp; ang/eng/ing/ong</div>
  <div class="meta">
    <span>Year 7 Chinese</span>
    <span class="sep"></span>
    <span>50 mins</span>
    <span class="sep"></span>
    <span>Reading + Listening</span>
  </div>
</div>

<div class="road-watermark"></div>
</body>
</html>
