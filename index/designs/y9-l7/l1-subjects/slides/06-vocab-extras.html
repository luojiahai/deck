<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L1-06 · Extra Subjects</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content:flex-start; padding:40px 100px 36px; }
  .section-label { font-size:16px; font-weight:700; letter-spacing:0.14em; color:var(--accent-blue); text-transform:uppercase; margin-bottom:10px; }
  .main-title { font-family:var(--font-display); font-size:46px; font-weight:900; margin-bottom:28px; }
  .vocab-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:18px; margin-bottom:28px; }
  .vocab-card { background:var(--bg-secondary); border:1.5px solid var(--border-light); border-radius:var(--radius-xl); padding:26px 24px; display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center; }
  .vocab-card.hl { border-color:var(--accent-gold); background:var(--accent-gold-dim); }
  .vc-icon { font-size:44px; line-height:1; }
  .vc-hanzi { font-family:var(--font-display); font-size:48px; font-weight:900; color:var(--text-primary); }
  .vc-pinyin { font-size:19px; color:var(--accent-teal); font-weight:600; }
  .vc-english { font-size:18px; color:var(--text-secondary); }

  .total-strip { display:flex; align-items:center; gap:20px; background:var(--bg-tertiary); border:2px solid var(--border-medium); border-radius:var(--radius-lg); padding:18px 32px; }
  .total-label { font-size:18px; color:var(--text-secondary); }
  .total-count { font-family:var(--font-display); font-size:44px; font-weight:900; color:var(--accent-blue); margin:0 8px; }
  .total-note { font-size:16px; color:var(--text-muted); margin-left:auto; }
  .subjects-inline { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  .sub-tag { font-family:var(--font-display); font-size:18px; font-weight:700; background:var(--bg-secondary); border:1px solid var(--border-light); border-radius:var(--radius-sm); padding:4px 12px; color:var(--text-primary); }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L1 · 科目</span>
  <span class="sep"></span>
  <span class="section-name">I Do · Extras · 20–24 min</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content">
  <div class="section-label">20–24 min · I Do · Extra Vocabulary</div>
  <div class="main-title">选修科目 · Extra Subjects (Act.4, p.63)</div>

  <div class="vocab-grid">
    <div class="vocab-card hl">
      <div class="vc-icon">🎨</div>
      <div class="vc-hanzi">美术</div>
      <div class="vc-pinyin">měishù</div>
      <div class="vc-english">fine art</div>
    </div>
    <div class="vocab-card">
      <div class="vc-icon">🎭</div>
      <div class="vc-hanzi">戏剧</div>
      <div class="vc-pinyin">xìjù</div>
      <div class="vc-english">drama</div>
    </div>
    <div class="vocab-card">
      <div class="vc-icon">🗼</div>
      <div class="vc-hanzi">法语</div>
      <div class="vc-pinyin">Fǎyǔ</div>
      <div class="vc-english">French</div>
    </div>
    <div class="vocab-card hl">
      <div class="vc-icon">⛩️</div>
      <div class="vc-hanzi">日语</div>
      <div class="vc-pinyin">Rìyǔ</div>
      <div class="vc-english">Japanese</div>
    </div>
  </div>

  <div class="total-strip">
    <span class="total-label">Grand total today:</span>
    <span class="total-count">十五</span>
    <span class="total-label">门课</span>
    <span class="total-note">15 subjects — all the vocab you need for the activities</span>
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y9 Chinese · Unit 3 科目</span>
</div>

</body>
</html>
