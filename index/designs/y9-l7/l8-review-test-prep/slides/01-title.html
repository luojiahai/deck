<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L8-01 · Title · 综合复习 · Test 3.1 Preparation</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  body {
    overflow: hidden;
    position: relative;
    background: var(--bg-primary);
  }

  /* ── Gold FINAL LESSON banner ── */
  .final-banner {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--accent-gold) 0%, #D4A050 60%, var(--accent-gold) 100%);
    z-index: 20;
  }
  .final-tag {
    position: absolute;
    top: 18px; left: 80px;
    background: var(--accent-gold);
    color: #fff;
    font-family: var(--font-body);
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 5px 20px;
    border-radius: 999px;
    z-index: 20;
  }

  /* ── Decorative large "8" on the right ── */
  .bg-eight {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-display);
    font-size: 480px; font-weight: 900;
    color: var(--accent-blue);
    opacity: 0.07;
    line-height: 1;
    pointer-events: none;
    user-select: none;
    z-index: 0;
  }

  /* ── Left content column ── */
  .left-content {
    position: absolute;
    top: 0; left: 0;
    width: 1120px; height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 100px 0 100px;
    z-index: 1;
  }

  .eyebrow {
    font-family: var(--font-body);
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .main-zh {
    font-family: var(--font-display);
    font-size: 96px; font-weight: 900;
    line-height: 1.05; letter-spacing: -0.02em;
    color: var(--accent-blue);
    margin-bottom: 16px;
  }

  .subtitle {
    font-family: var(--font-body);
    font-size: 32px; font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
    margin-bottom: 36px;
  }
  .subtitle strong {
    color: var(--text-primary);
    font-weight: 700;
  }

  /* Meta strip */
  .meta-strip {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 52px;
  }
  .meta-item {
    font-family: var(--font-body);
    font-size: 17px; font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }
  .meta-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent-blue);
    opacity: 0.3;
  }

  /* Lesson chips */
  .chips-label {
    font-family: var(--font-body);
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .chips-row {
    display: flex; gap: 10px; flex-wrap: nowrap;
  }
  .chip {
    font-family: var(--font-body);
    font-size: 15px; font-weight: 700;
    padding: 8px 20px;
    border-radius: 999px;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .chip-ghost {
    background: transparent;
    border: 1.5px solid var(--border-medium);
    color: var(--text-muted);
  }
  .chip-solid {
    background: var(--accent-blue);
    border: 1.5px solid var(--accent-blue);
    color: #fff;
    box-shadow: 0 4px 16px rgba(58,95,138,0.30);
  }

  /* Right decorative number panel */
  .right-panel {
    position: absolute;
    right: 0; top: 0;
    width: 800px; height: 1080px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 0;
  }

  /* Accent vertical bar */
  .left-accent-bar {
    position: absolute;
    left: 80px; top: 120px; bottom: 120px;
    width: 4px;
    background: var(--accent-blue);
    border-radius: 2px;
    opacity: 0.2;
  }
</style>
</head>
<body>

<!-- Top gold rule -->
<div class="final-banner"></div>
<div class="final-tag">FINAL LESSON</div>

<!-- Decorative huge "8" -->
<div class="bg-eight">8</div>

<!-- Subtle left accent bar -->
<div class="left-accent-bar"></div>

<!-- Main left content -->
<div class="left-content">

  <div class="eyebrow">L8 · 第八课 · Lesson 8 of 8</div>

  <div class="main-zh">综合复习</div>

  <div class="subtitle">
    <strong>Test 3.1 Preparation</strong> · 第八课
  </div>

  <div class="meta-strip">
    <span class="meta-item">L8</span>
    <span class="meta-dot"></span>
    <span class="meta-item">50 min</span>
    <span class="meta-dot"></span>
    <span class="meta-item">Unit 3 School Life</span>
    <span class="meta-dot"></span>
    <span class="meta-item">Speaking + Writing</span>
  </div>

  <div class="chips-label">Unit 3 · 8-Lesson Journey</div>
  <div class="chips-row">
    <span class="chip chip-ghost">L1</span>
    <span class="chip chip-ghost">L2</span>
    <span class="chip chip-ghost">L3</span>
    <span class="chip chip-ghost">L4</span>
    <span class="chip chip-ghost">L5</span>
    <span class="chip chip-ghost">L6</span>
    <span class="chip chip-ghost">L7</span>
    <span class="chip chip-solid">L8</span>
  </div>

</div>

<!-- Footer -->
<div class="slide-footer">
  <span class="brand">Y9 Chinese · Unit 3 科目</span>
  <span>综合复习 · Test 3.1 Preparation</span>
</div>

</body>
</html>
