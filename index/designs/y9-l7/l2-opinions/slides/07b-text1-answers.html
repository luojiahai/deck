<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L2-07b · Text 1 Answers</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content:flex-start; padding:40px 100px 36px; }
  .section-label { font-size:15px; font-weight:700; letter-spacing:0.14em; color:var(--accent-gold); text-transform:uppercase; margin-bottom:8px; }
  .main-title { font-family:var(--font-display); font-size:50px; font-weight:900; margin-bottom:28px; }
  .q-list { display:flex; flex-direction:column; gap:16px; max-width:820px; }
  .q-item { background:var(--bg-secondary); border-radius:var(--radius-md); padding:18px 22px; border:1px solid var(--border-light); }
  .q-num { display:inline-block; font-size:13px; font-weight:700; color:var(--accent-gold); letter-spacing:0.06em; margin-bottom:4px; }
  .q-text { font-family:var(--font-display); font-size:26px; font-weight:700; color:var(--text-secondary); margin-bottom:10px; }
  .q-answer-box { background:var(--accent-gold-dim); border:2px solid var(--accent-gold); border-radius:var(--radius-md); padding:10px 18px; display:inline-flex; align-items:center; gap:10px; }
  .q-answer-zh { font-family:var(--font-display); font-size:28px; font-weight:900; color:var(--text-primary); }
  .q-answer-zh .key { color:var(--accent-gold); }
  .q-answer-note { font-size:14px; color:var(--text-muted); margin-left:4px; }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L2 · 我觉得</span>
  <span class="sep"></span>
  <span class="section-name">I Do · Text 1 Answers ↳</span>
  <div class="accent-line" style="background:var(--accent-gold);"></div>
</div>

<div class="slide-content">
  <div class="section-label">Answers Revealed · 答案</div>
  <div class="main-title">课文答案 · Text 1 Answers</div>

  <div class="q-list">
    <div class="q-item">
      <div class="q-num">Q1</div>
      <div class="q-text">他觉得汉语有用吗？</div>
      <div class="q-answer-box">
        <span style="font-size:20px;">✅</span>
        <div class="q-answer-zh"><span class="key">有用</span>。</div>
        <div class="q-answer-note">他觉得汉语很有用。</div>
      </div>
    </div>
    <div class="q-item">
      <div class="q-num">Q2</div>
      <div class="q-text">汉语难学吗？</div>
      <div class="q-answer-box">
        <span style="font-size:20px;">✅</span>
        <div class="q-answer-zh"><span class="key">难学</span>。</div>
        <div class="q-answer-note">但是汉语很难学。</div>
      </div>
    </div>
    <div class="q-item">
      <div class="q-num">Q3</div>
      <div class="q-text">为什么汉字不容易学？</div>
      <div class="q-answer-box">
        <span style="font-size:20px;">✅</span>
        <div class="q-answer-zh">因为<span class="key">不容易</span>写。</div>
        <div class="q-answer-note">因为汉字不容易写。</div>
      </div>
    </div>
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y9 Chinese · Unit 3 科目</span>
</div>

</body>
</html>
