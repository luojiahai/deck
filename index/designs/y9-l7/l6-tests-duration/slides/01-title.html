<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L6-01 · Title · 功课与考试</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  body { display:flex; align-items:center; justify-content:center; background:var(--bg-primary); overflow:hidden; }
  .main { text-align:center; position:relative; z-index:1; }
  .lesson-num { font-size:20px; font-weight:700; letter-spacing:0.2em; color:var(--accent-blue); text-transform:uppercase; margin-bottom:var(--space-md); }
  .title-cn { font-family:var(--font-display); font-size:148px; font-weight:900; line-height:1.0; color:var(--text-primary); margin-bottom:10px; }
  .title-cn .dot { color:var(--accent-blue); }
  .title-en { font-size:34px; color:var(--text-muted); font-weight:400; letter-spacing:0.04em; margin-bottom:var(--space-xl); }
  .meta { display:flex; align-items:center; justify-content:center; gap:24px; font-size:16px; color:var(--text-muted); letter-spacing:0.06em; }
  .meta .sep { width:4px; height:4px; border-radius:50%; background:var(--accent-blue); }
  .bg-char-l { position:absolute; left:-120px; top:-80px; font-family:var(--font-display); font-size:360px; color:var(--accent-blue); opacity:0.04; line-height:1; pointer-events:none; user-select:none; }
  .bg-char-r { position:absolute; right:-100px; bottom:-100px; font-family:var(--font-display); font-size:360px; color:var(--accent-teal); opacity:0.04; line-height:1; pointer-events:none; user-select:none; }
  .hero-icons { display:flex; align-items:center; justify-content:center; gap:32px; margin-bottom:var(--space-md); }
  .hero-icon { font-size:72px; opacity:0.18; }
</style>
</head>
<body>
<div class="bg-char-l">功</div>
<div class="bg-char-r">试</div>
<div class="main">
  <div class="lesson-num">Lesson 6 of 8 · Y9 Unit 3</div>
  <div class="hero-icons">
    <span class="hero-icon">📝</span>
    <span class="hero-icon">📚</span>
    <span class="hero-icon">⏱️</span>
  </div>
  <h1 class="title-cn">功课<span class="dot">·</span>考试</h1>
  <div class="title-en">Homework, Tests &amp; Duration · 多长时间</div>
  <div class="meta">
    <span>Year 9 Chinese</span>
    <span class="sep"></span>
    <span>50 mins</span>
    <span class="sep"></span>
    <span>Reading + Writing</span>
    <span class="sep"></span>
    <span>轻松学中文 Book 3 · Text 2 p.67</span>
  </div>
</div>
</body>
</html>
