<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L4-07b · CFU Answers</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content:flex-start; padding:36px 100px 36px; }
  .page-title { font-family:var(--font-display); font-size:46px; font-weight:900; color:var(--text-primary); margin-bottom:24px; }
  .section-badge { display:inline-block; background:var(--accent-gold); color:#fff; font-size:13px; font-weight:700; letter-spacing:0.08em; padding:3px 14px; border-radius:999px; margin-bottom:14px; }
  .answer-item { display:flex; gap:24px; align-items:flex-start; background:var(--accent-gold-dim); border:2px solid var(--accent-gold); border-radius:var(--radius-lg); padding:24px 28px; max-width:900px; }
  .answer-icon { font-size:40px; flex-shrink:0; }
  .answer-body { flex:1; }
  .answer-label { font-size:13px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent-gold); margin-bottom:10px; }
  .answer-title { font-size:20px; color:var(--text-secondary); margin-bottom:14px; }
  .answer-zh { font-family:var(--font-display); font-size:32px; font-weight:900; color:var(--text-primary); }
  .answer-zh .wrong { color:var(--accent-coral); text-decoration:line-through; }

</style>

<body>

<div class="slide-header">
  <span class="lesson-tag">L4 · 汉字·采访</span>
  <span class="sep"></span>
  <span class="section-name">I Do · CFU Answers ↳</span>
  <div class="accent-line" style="background:var(--accent-gold);"></div>
</div>

<div class="slide-content">
  <div class="section-badge">Answers Revealed · 答案</div>
  <div class="page-title">答案 · CFU Checkpoints</div>

  <div class="answer-item">
    <div class="answer-icon">✅</div>
    <div class="answer-body">
      <div class="answer-label">Gesture · Error Detection</div>
      <div class="answer-title">Project this sentence — find the error, raise your hand:</div>
      <div class="answer-zh"><span class="wrong">我<u>在</u>历史很感兴趣</span> &nbsp;→&nbsp; 我<span class="key"><u>对</u></span>历史很感兴趣 ✓</div>
      <div class="answer-note">在 → <strong style="color:var(--accent-gold);">对</strong> &nbsp;|&nbsp; 对……感兴趣 is the fixed pattern for "interested in" — 在 is only for locations.</div>
    </div>
  </div>
</div>

  <span class="brand">Y9 Chinese · Unit 3 科目</span>
