<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L5-08b · CFU Answers</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content:flex-start; padding:34px 100px 30px; }
  .section-label { font-size:16px; font-weight:700; letter-spacing:0.14em; color:var(--accent-gold); text-transform:uppercase; margin-bottom:8px; }
  .main-title { font-family:var(--font-display); font-size:48px; font-weight:900; margin-bottom:22px; }

  .cfu-cols { display:grid; grid-template-columns:1.3fr 1fr; gap:24px; }
  .cfu-card { background:var(--accent-gold-dim); border:2px solid var(--accent-gold); border-radius:var(--radius-lg); padding:24px 26px; display:flex; flex-direction:column; gap:14px; }
  .cfu-badge { display:inline-block; align-self:flex-start; background:var(--accent-gold); color:#fff; font-size:13px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:4px 16px; border-radius:999px; }
  .cfu-title { font-family:var(--font-display); font-size:22px; font-weight:900; color:var(--text-primary); }

  .example-list { display:flex; flex-direction:column; gap:8px; }
  .eg-item { display:flex; align-items:center; gap:10px; background:#fff; border-radius:var(--radius-sm); padding:9px 14px; border:1px solid var(--border-light); }
  .eg-num { font-size:12px; font-weight:700; color:var(--text-muted); min-width:18px; text-align:center; }
  .eg-cn { font-family:var(--font-display); font-size:17px; font-weight:700; color:var(--text-primary); flex:1; line-height:1.3; }
  .eg-type { font-size:12px; font-weight:700; padding:3px 12px; border-radius:999px; flex-shrink:0; }
  .eg-type.q { background:var(--accent-blue-dim); color:var(--accent-blue); }
  .eg-type.a { background:var(--accent-teal-dim); color:var(--accent-teal); }

  .answer-box { background:#fff; border:1.5px solid var(--accent-gold); border-radius:var(--radius-md); padding:14px 18px; }
  .answer-zh { font-family:var(--font-display); font-size:32px; font-weight:900; color:var(--accent-gold); }
  .answer-py { font-size:15px; color:var(--text-muted); margin-top:2px; }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L5 · 为什么？因为！</span>
  <span class="sep"></span>
  <span class="section-name">I Do · CFU Answers ↳</span>
  <div class="accent-line" style="background:var(--accent-gold);"></div>
</div>

<div class="slide-content">
  <div class="section-label">Answers Revealed · 答案</div>
  <div class="main-title">CFU · Answers</div>

  <div class="cfu-cols">
    <!-- CFU 1 Answer -->
    <div class="cfu-card">
      <div class="cfu-badge">CFU 1 · Answer</div>
      <div class="cfu-title">是问句还是回答？</div>
      <div class="example-list">
        <div class="eg-item">
          <div class="eg-num">1</div>
          <div class="eg-cn">你为什么喜欢数学？</div>
          <div class="eg-type q">Q 问句</div>
        </div>
        <div class="eg-item">
          <div class="eg-num">2</div>
          <div class="eg-cn">因为我觉得数学很有意思。</div>
          <div class="eg-type a">A 回答</div>
        </div>
        <div class="eg-item">
          <div class="eg-num">3</div>
          <div class="eg-cn">因为我对历史很感兴趣。</div>
          <div class="eg-type a">A 回答</div>
        </div>
        <div class="eg-item">
          <div class="eg-num">4</div>
          <div class="eg-cn">你最喜欢哪个科目？为什么？</div>
          <div class="eg-type q">Q 问句</div>
        </div>
      </div>
    </div>

    <!-- CFU 2 Answer -->
    <div class="cfu-card">
      <div class="cfu-badge">CFU 2 · Answer</div>
      <div class="cfu-title">用中文怎么说 "boring"？</div>
      <div class="answer-box">
        <div class="answer-zh">没意思</div>
        <div class="answer-py">méi yìsi</div>
      </div>
    </div>
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y9 Chinese · Unit 3 科目</span>
</div>

</body>
</html>
