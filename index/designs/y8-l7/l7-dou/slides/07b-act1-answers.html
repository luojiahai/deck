<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L7-07b · Act 1 · Answers</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content {
    padding: 36px 100px 24px;
    gap: 16px;
  }
  .act-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .act-title {
    font-family: var(--font-display);
    font-size: 46px;
    font-weight: 900;
    color: var(--text-primary);
  }
  .act-chips {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 999px;
    padding: 7px 18px;
    font-size: 15px;
    font-weight: 700;
  }
  .chip-teal { background: var(--accent-teal-dim); color: var(--accent-teal); border: 1px solid var(--accent-teal); }
  .errors-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    flex: 1;
  }
  .error-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 20px 26px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card-num {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .wrong-sentence {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    color: var(--text-muted);
    text-decoration: line-through;
    text-decoration-color: var(--accent-coral);
    text-decoration-thickness: 2px;
    line-height: 1.3;
  }
  .divider {
    height: 1px;
    background: var(--border-light);
    margin: 2px 0;
  }
  .correct-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .correct-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-teal);
    flex-shrink: 0;
  }
  .correct-sentence {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.3;
  }
  .correct-sentence .dou {
    color: var(--accent-gold);
  }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L7 · 都 · BOTH / ALL</span>
  <span class="sep"></span>
  <span class="section-name">Activity 1 · Answers</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content flex-col">

  <div class="act-header">
    <div class="act-title">Correct the Teacher — Answers</div>
    <div class="act-chips">
      <div class="chip chip-teal">Act 1</div>
    </div>
  </div>

  <div class="errors-grid">

    <div class="error-card">
      <div class="card-num">Error 1</div>
      <div class="wrong-sentence">小说、杂志，我喜欢都看。</div>
      <div class="divider"></div>
      <div class="correct-row">
        <div class="correct-label">✓ Correct</div>
        <div class="correct-sentence">小说、杂志，我<span class="dou">都</span>喜欢看。</div>
      </div>
    </div>

    <div class="error-card">
      <div class="card-num">Error 2</div>
      <div class="wrong-sentence">油画儿、水彩画儿，她画都喜欢。</div>
      <div class="divider"></div>
      <div class="correct-row">
        <div class="correct-label">✓ Correct</div>
        <div class="correct-sentence">油画儿、水彩画儿，她<span class="dou">都</span>喜欢画。</div>
      </div>
    </div>

    <div class="error-card">
      <div class="card-num">Error 3</div>
      <div class="wrong-sentence">都弹钢琴、唱歌，他喜欢。</div>
      <div class="divider"></div>
      <div class="correct-row">
        <div class="correct-label">✓ Correct</div>
        <div class="correct-sentence">弹钢琴、唱歌，他<span class="dou">都</span>喜欢。</div>
      </div>
    </div>

    <div class="error-card">
      <div class="card-num">Error 4</div>
      <div class="wrong-sentence">我喜欢都国画儿和油画儿。</div>
      <div class="divider"></div>
      <div class="correct-row">
        <div class="correct-label">✓ Correct</div>
        <div class="correct-sentence">国画儿、油画儿，我<span class="dou">都</span>喜欢。</div>
      </div>
    </div>

  </div>

</div>

<div class="slide-footer">
  <span class="brand">Y8 Chinese · Unit 3 Hobbies 爱好</span>
</div>

</body>
</html>
