<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L5-06 · Comprehension Questions</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content { justify-content: flex-start; padding: 44px 140px 40px; }
  .section-label { font-size: 16px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 10px; }
  .main-title { font-family: var(--font-display); font-size: 46px; font-weight: 900; margin-bottom: 8px; }
  .instruction { font-size: 20px; color: var(--text-muted); margin-bottom: 32px; }

  .q-list { display: flex; flex-direction: column; gap: 16px; }
  .q-item {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 20px;
    align-items: center;
    background: var(--bg-secondary);
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 20px 28px;
  }
  .q-num {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--accent-gold);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 900;
    flex-shrink: 0;
  }
  .q-text {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .q-item.open {
    border-color: var(--accent-teal);
    background: var(--accent-teal-dim);
  }
  .q-item.open .q-num {
    background: var(--accent-teal);
  }
  .open-tag {
    display: inline-block;
    background: var(--accent-teal-dim);
    color: var(--accent-teal);
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 10px; border-radius: 999px;
    margin-left: 12px; vertical-align: middle;
    border: 1px solid var(--accent-teal);
  }

  .write-note {
    background: var(--accent-gold-dim);
    border: 2px solid var(--accent-gold);
    border-radius: var(--radius-md);
    padding: 12px 24px;
    font-size: 18px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px;
  }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L5 · ART VOCAB + TEXT 2 · 阅读·艺术</span>
  <span class="sep"></span>
  <span class="section-name">I Do · Text 2 Comprehension · 30–38 min</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content">
  <div class="section-label">30–38 min · I Do</div>
  <div class="main-title">理解问题 · Comprehension Questions</div>
  <div class="write-note">📝 Write your answers in full Chinese sentences in your exercise book.</div>

  <div class="q-list">
    <div class="q-item">
      <div class="q-num">1</div>
      <div class="q-text">B 喜欢看什么？</div>
    </div>
    <div class="q-item">
      <div class="q-num">2</div>
      <div class="q-text">B 喜欢画什么？</div>
    </div>
    <div class="q-item">
      <div class="q-num">3</div>
      <div class="q-text">B 正在学什么？</div>
    </div>
    <div class="q-item">
      <div class="q-num">4</div>
      <div class="q-text">A 也在学什么？</div>
    </div>
    <div class="q-item open">
      <div class="q-num">5</div>
      <div class="q-text">你喜欢看小说吗？用中文回答。<span class="open-tag">Open</span></div>
    </div>
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y8 Chinese · Unit 3 Hobbies 爱好</span>
</div>

</body>
</html>
