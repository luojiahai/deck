<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L1 · Hobby Vocabulary · 爱好词汇</title>
<script>
  window.DECK_MANIFEST = [
    { file: "slides/01-title.html",          label: "Title · 爱好词汇" },
    { file: "slides/02-review.html",         label: "Review · Unit 2 Vocabulary" },
    { file: "slides/03-li-sc.html",          label: "Learning Intention & SC" },
    { file: "slides/04-vocab.html",          label: "I Do · New Vocabulary (9 words)" },
    { file: "slides/05-pattern.html",        label: "I Do · Key Pattern 我喜欢" },
    { file: "slides/06-cfu.html",            label: "I Do · CFU Checkpoints" },
    { file: "slides/06b-cfu-answers.html",   label: "  ↳ CFU Answers" },
    { file: "slides/07-act1-tpr.html",       label: "Act 1 · TPR — Say It & Do It" },
    { file: "slides/08-act2-vocab-match.html", label: "Act 2 · Vocab Matching" },
    { file: "slides/09-act3-pair-chain.html", label: "Act 3 · Pair Chain Drill" },
    { file: "slides/10-act4-write.html",     label: "Act 4 · Write My Hobbies" },
    { file: "slides/11-plenary.html",        label: "Plenary + Exit Ticket" },
    { file: "slides/12-preview.html",        label: "Preview · Next Lesson" },
  ];
  window.DECK_WIDTH = 1920;
  window.DECK_HEIGHT = 1080;
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, "PingFang SC", sans-serif; background: #0a0a0a; }
  #stage { position: fixed; top: 50%; left: 50%; transform-origin: top left; will-change: transform; background: #fff; box-shadow: 0 10px 60px rgba(0,0,0,0.4); }
  #frame { width: 1920px; height: 1080px; overflow: hidden; position: relative; background: #fff; }
  .counter { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.65); color: #fff; padding: 6px 14px; border-radius: 999px; font-size: 13px; letter-spacing: 0.05em; font-variant-numeric: tabular-nums; z-index: 100; opacity: 0.7; }
  .counter .label { color: rgba(255,255,255,0.7); margin-left: 8px; }
  .list-btn { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.85); border: 0; padding: 7px 14px; border-radius: 999px; font-size: 13px; font-family: inherit; cursor: pointer; z-index: 100; opacity: 0.6; text-decoration: none; display: block; }
  .list-btn:hover { opacity: 1; }
  .nav-zone { position: fixed; top: 0; bottom: 0; width: 15%; cursor: pointer; z-index: 50; }
  .nav-zone.left { left: 0; } .nav-zone.right { right: 0; }
  .nav-hint { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 999px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; font-size: 22px; opacity: 0; transition: opacity .2s; }
  .nav-zone.left .nav-hint { left: 20px; } .nav-zone.right .nav-hint { right: 20px; }
  .nav-zone:hover .nav-hint { opacity: 1; }

  /* ── Scoped design tokens ── */
  #frame {
    --bg-primary: #FEFCF7; --bg-secondary: #F6F2E8; --bg-tertiary: #EDE7D7;
    --text-primary: #1E2A38; --text-secondary: #5B6677; --text-muted: #8B94A3;
    --accent-gold: #C8943E; --accent-gold-light: #E8CD8A; --accent-gold-dim: rgba(200,148,62,0.12);
    --accent-teal: #3A7D8C; --accent-teal-light: #6BAFB9; --accent-teal-dim: rgba(58,125,140,0.10);
    --accent-coral: #D4756B; --accent-coral-dim: rgba(212,117,107,0.10);
    --border-light: #E5DFD0; --border-medium: #D5CEBB;
    --font-display: 'Noto Serif SC', 'Songti SC', 'STSong', serif;
    --font-body: 'Noto Sans SC', 'PingFang SC', -apple-system, 'Microsoft YaHei', sans-serif;
    --font-mono: 'SF Mono', 'JetBrains Mono', 'Menlo', monospace;
    --space-xs:8px; --space-sm:16px; --space-md:24px; --space-lg:40px; --space-xl:64px; --space-2xl:96px;
    --radius-sm:6px; --radius-md:12px; --radius-lg:20px; --radius-xl:28px;
  }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap');
</style>
</head>
<body>
<a class="list-btn" href="../">← 列表</a>
<div id="stage"><div id="frame"></div></div>
<div class="nav-zone left" id="navL"><div class="nav-hint">‹</div></div>
<div class="nav-zone right" id="navR"><div class="nav-hint">›</div></div>
<div class="counter" id="counter">1 / 1</div>
<script>
(function () {
  const W = window.DECK_WIDTH || 1920, H = window.DECK_HEIGHT || 1080;
  const deck = window.DECK_MANIFEST || [];
  const stage = document.getElementById('stage'), frame = document.getElementById('frame'), counter = document.getElementById('counter');
  let current = 0;
  stage.style.width = W + 'px'; stage.style.height = H + 'px';
  function fit() {
    const s = Math.min(innerWidth / W, innerHeight / H);
    stage.style.transform = 'translate(' + ((innerWidth - W*s)/2) + 'px,' + ((innerHeight - H*s)/2) + 'px) scale(' + s + ')';
    stage.style.top = '0'; stage.style.left = '0';
  }
  let loadedFile = null;
  function show(idx) {
    if (idx < 0 || idx >= deck.length) return;
    current = idx;
    const item = deck[idx];
    counter.innerHTML = (idx+1) + ' / ' + deck.length + ' <span class="label">' + (item.label||'') + '</span>';
    if (location.hash !== '#'+(idx+1)) history.replaceState(null,'','#'+(idx+1));
    if (loadedFile !== item.file) {
      loadedFile = item.file;
      fetch(item.file).then(r=>r.text()).then(html=>{
        var linkRe=/<link[^>]*rel=["']stylesheet["'][^>]*href=["']([^"']+)["'][^>]*>/gi, cssLinks=[], lm;
        while((lm=linkRe.exec(html))!==null){cssLinks.push(lm[1]);}
        return Promise.all(cssLinks.map(href=>{
          var url=/^https?:/.test(href)?href:new URL(href,new URL(item.file,location.href)).href;
          return fetch(url).then(r=>r.text()).catch(()=>'');
        })).then(cssContents=>{
          var linkedCss=cssContents.join('\n');
          var styles=linkedCss?'<style>'+linkedCss.replace(/\b(html|body)\b(?=\s*[{,])/g,'#frame')+'</style>':'';
          var styleRe=/<style[^>]*>([\s\S]*?)<\/style>/gi, m;
          while((m=styleRe.exec(html))!==null){styles+='<style>'+m[1].replace(/\b(html|body)\b(?=\s*[{,])/g,'#frame')+'</style>';}
          var bodyM=html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
          frame.innerHTML=styles+(bodyM?bodyM[1]:'');
        });
      }).catch(()=>{frame.innerHTML='<div style="color:#fff;padding:40px;text-align:center;font-size:24px;">Slide not found</div>';});
    }
  }
  function next(){show(Math.min(current+1,deck.length-1));}
  function prev(){show(Math.max(current-1,0));}
  document.addEventListener('keydown',function(e){
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    switch(e.key){
      case'ArrowRight':case' ':case'PageDown':e.preventDefault();next();break;
      case'ArrowLeft':case'PageUp':e.preventDefault();prev();break;
      case'Home':e.preventDefault();show(0);break;
      case'End':e.preventDefault();show(deck.length-1);break;
      case'p':case'P':window.print();break;
      default:if(e.key>='1'&&e.key<='9'){var i=parseInt(e.key,10)-1;if(i<deck.length){e.preventDefault();show(i);}}
    }
  });
  document.getElementById('navL').addEventListener('click',prev);
  document.getElementById('navR').addEventListener('click',next);
  window.addEventListener('resize',fit);
  window.addEventListener('hashchange',function(){var m=location.hash.match(/^#(\d+)$/);if(m){current=parseInt(m[1],10)-1;show(current);}});
  fit(); show(0);
})();
</script>
</body>
</html>
