<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L4-01 · Title</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
  .slide-content {
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 0;
    padding: 60px 120px;
  }

  .unit-label {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  .title-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
  }

  .pinyin-hero {
    display: flex;
    align-items: center;
    gap: 40px;
  }

  .pinyin-chip {
    font-family: var(--font-display);
    font-size: 120px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .pinyin-chip.ao { color: var(--accent-gold); }
  .pinyin-chip.ou { color: var(--accent-teal); }

  .vs-divider {
    font-size: 48px;
    color: var(--border-medium);
    font-weight: 700;
  }

  .subtitle-cn {
    font-family: var(--font-display);
    font-size: 44px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }

  .subtitle-en {
    font-size: 26px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 32px;
    margin-top: 8px;
  }

  .meta-chip {
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: 999px;
    padding: 8px 24px;
    font-size: 17px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .meta-chip.highlight {
    background: var(--accent-teal-dim);
    border-color: var(--accent-teal);
    color: var(--accent-teal);
    font-weight: 700;
  }

  .deco-line {
    width: 120px;
    height: 4px;
    background: linear-gradient(90deg, var(--accent-gold), var(--accent-teal));
    border-radius: 2px;
    margin: 24px auto 0;
  }
</style>
</head>
<body>

<div class="slide-header">
  <span class="lesson-tag">L4 · PINYIN ao/ou + LISTENING</span>
  <span class="sep"></span>
  <span class="section-name">Lesson Title</span>
  <div class="accent-line"></div>
</div>

<div class="slide-content">
  <div class="unit-label">Year 8 · Unit 3 · Lesson 4</div>

  <div class="title-block">
    <div class="pinyin-hero">
      <span class="pinyin-chip ao">ao</span>
      <span class="vs-divider">/</span>
      <span class="pinyin-chip ou">ou</span>
    </div>
    <div class="deco-line"></div>
  </div>

  <div class="subtitle-cn">拼音辨音 · 听力练习</div>
  <div style="height:12px"></div>
  <div class="subtitle-en">Pinyin Distinction &amp; Listening Practice</div>

  <div class="meta-row">
    <span class="meta-chip">50 min</span>
    <span class="meta-chip highlight">听力 Listening</span>
    <span class="meta-chip">Book 2 · Unit 3</span>
    <span class="meta-chip">CD Tracks 32 &amp; 33</span>
  </div>
</div>

<div class="slide-footer">
  <span class="brand">Y8 Chinese · Unit 3 Hobbies 爱好</span>
</div>

</body>
</html>
